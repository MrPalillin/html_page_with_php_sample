<html>
<head>
<title>Ejemplo de formulario con utilidad PHP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<link rel="icon" type="image/x-icon" href="favicon.webp">
</head>
<body>
<div class="container gy-6 text-center">
<form action="print_values.php" method="post">
<div class="row p-3">
<div class="col>
<label class="form-label">Name</label>
</div>
<div class="col">
<input type="text" class="form-control" name="username">
</div>
</div>
<div class="row p-3">
<div class="col>
<label class="form-check-label">¿Is checked?</label>
</div>
<div class="col">
<input type="checkbox" class="form-check-input" name="check">
</div>
</div>
<div class="row p-3">
<div class="col">
<input type="submit" value="Print values">
</div>
</div>
</form>
</div>
</body>
</html>
